services:
  backend:
    image: ghcr.io/${GHCR_OWNER:?GHCR_OWNER is required}/apicred-backend:${APICRED_TAG:-latest}
    mem_limit: 1g
    cpus: 1.0
    restart: unless-stopped
    environment:
      PRODUCTION_MODE: "true"
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      ADMIN_TOKEN: ${ADMIN_TOKEN:?ADMIN_TOKEN is required}
      APP_SECRET: ${APP_SECRET:?APP_SECRET is required}
      TOKEN_SALT: ${TOKEN_SALT:?TOKEN_SALT is required}
      DEBUG_ENDPOINTS_ENABLED: "false"
      STARTUP_CREATE_TABLES_ENABLED: "false"
      STARTUP_SCHEMA_COMPAT_ENABLED: "false"
      STARTUP_BOOTSTRAP_ENABLED: "false"
    ports:
      - "8103:8103"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8103/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/${GHCR_OWNER:?GHCR_OWNER is required}/apicred-frontend:${APICRED_TAG:-latest}
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5106:80"
