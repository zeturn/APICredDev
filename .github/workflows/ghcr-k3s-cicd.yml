name: APICred CI + Harbor Build

on:
  push:
    branches: [main, deploy]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  CONFIG_FILE: .github/cicd-images.json

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate config
        run: |
          test -f "${CONFIG_FILE}"
          jq -e '.images and (.images | length > 0)' "${CONFIG_FILE}" >/dev/null
          jq -e '[.images[] | has("name") and has("context") and has("dockerfile") and has("image_repository") and has("beancs_project")] | all' "${CONFIG_FILE}" >/dev/null

      - name: Build matrix
        id: matrix
        run: |
          MATRIX_JSON=$(jq -c '{include: [.images[] | {name, context, dockerfile, image_repository, beancs_project, build_args: (.build_args // "")}]}' "${CONFIG_FILE}")
          echo "matrix=${MATRIX_JSON}" >> "$GITHUB_OUTPUT"

  test_backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip poetry
          poetry config virtualenvs.create false
          poetry install --with dev --no-interaction --no-ansi

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          PYTHONPATH: "."
        run: |
          pytest -q --cov=app --cov-report=term-missing

  test_frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  build_and_notify_beancs:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [prepare, test_backend, test_frontend]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve tags
        id: meta
        shell: bash
        run: |
          IMAGE_TAG="${GITHUB_REF_NAME}"
          IMAGE_SHA_TAG="beancs-${GITHUB_SHA::12}"
          IMAGE_PRIMARY="${{ matrix.image_repository }}:${IMAGE_TAG}"
          IMAGE_SHA="${{ matrix.image_repository }}:${IMAGE_SHA_TAG}"
          echo "image_primary=${IMAGE_PRIMARY}" >> "$GITHUB_OUTPUT"
          echo "image_sha=${IMAGE_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.BEANCS_REGISTRY_HOST }}
          username: ${{ secrets.BEANCS_REGISTRY_USERNAME }}
          password: ${{ secrets.BEANCS_REGISTRY_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ steps.meta.outputs.image_primary }}
            ${{ steps.meta.outputs.image_sha }}

      - name: Notify BeanCS
        if: always()
        env:
          BEANCS_PROJECT: ${{ matrix.beancs_project }}
          BEANCS_WEBHOOK_URL: ${{ secrets.BEANCS_WEBHOOK_URL }}
          BEANCS_WEBHOOK_SECRET: ${{ secrets.BEANCS_WEBHOOK_SECRET }}
          BEANCS_STATUS: ${{ job.status }}
          BEANCS_IMAGE: ${{ steps.meta.outputs.image_primary }}
          BEANCS_DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          STATUS="failure"
          if [ "$BEANCS_STATUS" = "success" ]; then STATUS="success"; fi
          BODY=$(jq -nc \
            --arg project "$BEANCS_PROJECT" \
            --arg tag "$BEANCS_IMAGE" \
            --arg digest "$BEANCS_DIGEST" \
            --arg commit "$GITHUB_SHA" \
            --arg status "$STATUS" \
            '{project:$project, tag:$tag, digest:$digest, commit:$commit, status:$status}')
          SIG="sha256=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$BEANCS_WEBHOOK_SECRET" -binary | xxd -p -c 256)"
          curl -fsS -X POST "$BEANCS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            --data "$BODY"
