provider_endpoints:
  - provider: openai
    slug: default
    display_name: OpenAI Default
    base_url: https://api.openai.com
    enabled: true
    health_state: healthy
  - provider: gemini
    slug: default
    display_name: Google Gemini Default
    base_url: https://generativelanguage.googleapis.com
    enabled: true
    health_state: healthy
  - provider: anthropic
    slug: default
    display_name: Anthropic Default
    base_url: https://api.anthropic.com
    enabled: true
    health_state: healthy
  - provider: openrouter
    slug: default
    display_name: OpenRouter Default
    base_url: https://openrouter.ai/api
    enabled: true
    health_state: healthy
  - provider: brave-search
    slug: web
    display_name: Brave Web Search
    base_url: https://api.search.brave.com/res/v1
    enabled: true
    health_state: healthy

provider_credentials:
  - provider: openai
    endpoint: default
    display_name: OpenAI free daily shared traffic
    enabled: true
    health_state: healthy
  - provider: brave-search
    endpoint: web
    display_name: Brave Search main key
    enabled: true
    health_state: healthy
