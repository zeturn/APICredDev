services:
  postgres:
    image: postgres:16
    mem_limit: 1g
    cpus: 1.0
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-apicred}
      POSTGRES_USER: ${POSTGRES_USER:-apicred}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5403:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apicred -d apicred"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7
    mem_limit: 512m
    cpus: 0.5
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    ports:
      - "6303:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:?REDIS_PASSWORD is required}\" ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    mem_limit: 1g
    cpus: 1.0
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-apicred}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-apicred}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      APP_SECRET: ${APP_SECRET:?APP_SECRET is required}
      TOKEN_SALT: ${TOKEN_SALT:?TOKEN_SALT is required}
      DEBUG_ENDPOINTS_ENABLED: "true"
      STARTUP_CREATE_TABLES_ENABLED: "true"
      STARTUP_SCHEMA_COMPAT_ENABLED: "true"
      STARTUP_BOOTSTRAP_ENABLED: "false"
      BASALTPASS_INTERNAL_BASE_URL: ${BASALTPASS_INTERNAL_BASE_URL:-http://host.docker.internal:8101}
    ports:
      - "8103:8103"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8103/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    image: node:20
    mem_limit: 1536m
    cpus: 1.0
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: ["sh", "-lc", "npm install && npm run dev -- --host --port 5106"]
    ports:
      - "5106:5106"
    depends_on:
      - backend

volumes:
  frontend_node_modules:

