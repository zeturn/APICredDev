services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: apicred
      POSTGRES_USER: apicred
      POSTGRES_PASSWORD: ZHxXmRf8ApKAXWh7
    ports:
      - "5403:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    command: ["redis-server", "--requirepass", "jynthbgrvfecs22650"]
    ports:
      - "6303:6379"
    volumes:
      - ./data/redis:/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://apicred:ZHxXmRf8ApKAXWh7@postgres:5432/apicred
      REDIS_URL: redis://:jynthbgrvfecs22650@redis:6379/0
      ADMIN_TOKEN: dev-admin-token
      APP_SECRET: dev-secret
      TOKEN_SALT: dev-token-salt
    ports:
      - "8103:8103"
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: ["sh", "-lc", "npm install && npm run dev -- --host --port 5106"]
    ports:
      - "5106:5106"
    depends_on:
      - backend

volumes:
  frontend_node_modules:

